<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 04 - Premium Dark To-Do Web App</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="brand-title">
                <h1>TO-DO WEB APP</h1>
                <p>Organize your routines and standalone tasks</p>
            </div>
        </header>

        <form class="task-form" id="taskForm">
            <input type="hidden" id="editingTaskId" value="">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="What assignment are we updating today?" required>
            </div>
            <div class="meta-inputs">

              <select id="taskFrequencySelect">
                    <option value="One Time">One Time</option>
                    <option value="Every Day">Every Day</option>
                    <option value="Weekly">Weekly</option>
                    <option value="Monthly">Monthly</option>
                </select>

              <select id="taskTypeSelect">
                    <option value="Work">Work</option>
                    <option value="Shopping">Shopping</option>
                  <option value="Shopping">personal</option>
                    <option value="Others">Others</option>
                </select>
                <input type="datetime-local" id="taskDateTime">
            </div>
            <button type="submit" id="submitBtn"><i class="fa-solid fa-plus"></i> Add Task</button>
        </form>


      <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all')">All Tasks</button>
            <button class="filter-btn" onclick="filterTasks('Every Day')">Every Day</button>
            <button class="filter-btn" onclick="filterTasks('Weekly')">Weekly</button>
            <button class="filter-btn" onclick="filterTasks('Monthly')">Monthly</button>
            <button class="filter-btn" onclick="filterTasks('One Time')">One Time</button>
            <button class="filter-btn" onclick="filterTasks('Work')">Work</button>
            <button class="filter-btn" onclick="filterTasks('Shopping')">Shopping</button>
            <button class="filter-btn" onclick="filterTasks('Others')">Others</button>
        </div>

        <div class="task-list" id="taskListContainer">

        </div>

        <div class="footer-brand">SkillCraft Technology</div>
    </div>


  <script src="script.js"></script>
</body>
</html>
